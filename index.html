<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>방과 후, 균열 — 인터랙티브 TRPG</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Gowun+Dodum&family=Jua&display=swap');

  :root{
    --bg0:#05060f;
    --bg1:#0b1026;
    --neon:#5ef2ff;
    --neon2:#b46bff;
    --magic:#ffd166;
    --danger:#ff4d6d;
    --good:#5cffa6;
    --ink:#e9f0ff;
    --panel:rgba(12,18,40,.78);
  }

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{
    font-family:'Gowun Dodum',sans-serif;
    background:radial-gradient(120% 120% at 50% -10%, #15123a 0%, var(--bg1) 40%, var(--bg0) 100%);
    color:var(--ink);
    overflow:hidden;
    user-select:none;
  }

  #stars{position:fixed;inset:0;z-index:0;}

  #app{position:relative;z-index:2;height:100%;display:flex;align-items:center;justify-content:center;padding:16px;}
  .stage{
    width:min(900px,100%);height:min(96vh,820px);
    background:var(--panel);border:1px solid rgba(94,242,255,.25);border-radius:22px;
    box-shadow:0 0 60px rgba(94,242,255,.10), inset 0 0 60px rgba(180,107,255,.07);
    backdrop-filter:blur(6px);display:flex;flex-direction:column;overflow:hidden;position:relative;
  }

  #hud{
    display:none;align-items:center;gap:10px;padding:10px 16px;
    border-bottom:1px solid rgba(94,242,255,.18);
    background:linear-gradient(90deg, rgba(94,242,255,.06), rgba(180,107,255,.06));
    font-size:13px;flex-wrap:wrap;
  }
  .hudchar{font-family:'Jua';color:var(--neon);font-size:15px;letter-spacing:.5px;}
  .stat{display:flex;align-items:center;gap:6px;background:rgba(0,0,0,.3);padding:4px 9px;border-radius:20px;border:1px solid rgba(255,255,255,.08);}
  .stat b{font-family:'Jua';}
  .bar{width:72px;height:9px;background:rgba(255,255,255,.12);border-radius:6px;overflow:hidden;}
  .bar>span{display:block;height:100%;border-radius:6px;transition:width .5s cubic-bezier(.2,.9,.2,1);}
  .hp .bar>span{background:linear-gradient(90deg,#ff4d6d,#ff9a5b);}
  .shadow .bar>span{background:linear-gradient(90deg,#7a3cff,#3a0a66);}
  #hudInv{margin-left:auto;display:flex;gap:6px;flex-wrap:wrap;}
  .chip{font-size:11px;padding:3px 8px;border-radius:20px;background:rgba(255,209,102,.14);border:1px solid rgba(255,209,102,.35);color:var(--magic);}

  #scene{flex:1;overflow-y:auto;padding:26px 30px 10px;scrollbar-width:thin;scrollbar-color:rgba(94,242,255,.4) transparent;}
  #scene::-webkit-scrollbar{width:8px;}
  #scene::-webkit-scrollbar-thumb{background:rgba(94,242,255,.35);border-radius:8px;}

  .speaker{font-family:'Jua';font-size:14px;letter-spacing:1px;margin:18px 0 4px;display:inline-block;padding:2px 12px;border-radius:20px;}
  .sp-승호{color:#8be9ff;background:rgba(94,242,255,.12);border:1px solid rgba(94,242,255,.4);}
  .sp-범진{color:#ffd28b;background:rgba(255,209,102,.12);border:1px solid rgba(255,209,102,.4);}
  .sp-세나{color:#ff9ad4;background:rgba(255,107,214,.12);border:1px solid rgba(255,107,214,.4);}
  .sp-???{color:#c8a0ff;background:rgba(180,107,255,.14);border:1px solid rgba(180,107,255,.45);animation:flickerName 2.4s infinite;}
  .sp-수아{color:#9affd0;background:rgba(92,255,166,.12);border:1px solid rgba(92,255,166,.4);}
  @keyframes flickerName{0%,100%{opacity:1}50%{opacity:.55}}

  .line{font-size:18px;line-height:1.85;margin:6px 0 14px;}
  .narr{color:#b9c4e6;font-style:italic;}
  .big{font-family:'Black Han Sans';font-size:clamp(26px,6vw,46px);text-align:center;
       background:linear-gradient(90deg,var(--neon),var(--neon2),var(--magic));
       -webkit-background-clip:text;background-clip:text;color:transparent;margin:18px 0;
       filter:drop-shadow(0 0 18px rgba(94,242,255,.45));}
  .glitch{animation:glitch .25s steps(2) infinite;}
  @keyframes glitch{0%{transform:translate(0)}25%{transform:translate(-2px,1px)}50%{transform:translate(2px,-1px)}75%{transform:translate(-1px,-1px)}100%{transform:translate(0)}}

  #choices{padding:6px 30px 24px;display:flex;flex-direction:column;gap:11px;}
  .choice{font-family:'Gowun Dodum';font-size:16px;text-align:left;color:var(--ink);cursor:pointer;
    padding:14px 18px;border-radius:14px;background:linear-gradient(90deg,rgba(94,242,255,.07),rgba(180,107,255,.07));
    border:1px solid rgba(94,242,255,.25);transition:.18s;position:relative;overflow:hidden;}
  .choice:before{content:"▸";color:var(--neon);margin-right:10px;font-weight:bold;}
  .choice:hover{transform:translateX(6px);border-color:var(--neon);box-shadow:0 0 22px rgba(94,242,255,.25);background:linear-gradient(90deg,rgba(94,242,255,.16),rgba(180,107,255,.14));}
  .choice .tag{float:right;font-size:12px;opacity:.85;font-family:'Jua';}
  .tag.cou{color:#ff9a5b;} .tag.wis{color:#8be9ff;} .tag.fri{color:#ff9ad4;} .tag.luck{color:var(--magic);} .tag.hard{color:var(--danger);}
  .choice.locked{opacity:.4;cursor:not-allowed;}
  .choice.locked:hover{transform:none;box-shadow:none;}

  .center{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;padding:24px;gap:8px;}
  .title-main{font-family:'Black Han Sans';font-size:clamp(40px,11vw,86px);line-height:.95;
    background:linear-gradient(120deg,#5ef2ff,#b46bff 50%,#ffd166);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 0 30px rgba(180,107,255,.5));letter-spacing:-1px;}
  .title-sub{font-family:'Jua';color:#9fb2e6;letter-spacing:4px;font-size:clamp(12px,3vw,16px);margin-top:6px;}
  .btn{font-family:'Jua';font-size:18px;letter-spacing:1px;cursor:pointer;margin-top:18px;padding:14px 38px;
    border-radius:40px;border:none;color:#06121f;background:linear-gradient(90deg,var(--neon),var(--neon2));
    box-shadow:0 0 30px rgba(94,242,255,.5);transition:.2s;}
  .btn:hover{transform:scale(1.06);box-shadow:0 0 46px rgba(180,107,255,.7);}
  .credit{font-size:12px;color:#5e6e9c;margin-top:20px;line-height:1.7;}

  .picks{display:flex;gap:18px;flex-wrap:wrap;justify-content:center;margin-top:14px;}
  .pick{width:230px;max-width:80vw;background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.12);
    border-radius:18px;padding:20px;cursor:pointer;transition:.2s;text-align:left;}
  .pick:hover{transform:translateY(-6px);border-color:var(--neon);box-shadow:0 12px 40px rgba(94,242,255,.25);}
  .pick .face{font-size:54px;text-align:center;margin-bottom:6px;filter:drop-shadow(0 0 12px rgba(180,107,255,.5));}
  .pick h3{font-family:'Black Han Sans';margin:4px 0;font-size:24px;}
  .pick.bj h3{color:var(--magic);} .pick.sn h3{color:#ff9ad4;}
  .pick p{font-size:13px;color:#aebbe0;line-height:1.6;margin:6px 0;}
  .pick .mini{font-size:12px;font-family:'Jua';color:#8be9ff;}

  #diceLayer{position:absolute;inset:0;z-index:30;display:none;align-items:center;justify-content:center;
    background:rgba(2,4,12,.72);backdrop-filter:blur(3px);flex-direction:column;gap:14px;}
  .dwrap{perspective:700px;}
  .die{width:120px;height:120px;position:relative;transform-style:preserve-3d;}
  .die.roll{animation:tumble 1.1s cubic-bezier(.3,.7,.3,1) forwards;}
  /* 회전을 360의 배수로 끝내 숫자가 거울처럼 뒤집히지 않게 함 */
  @keyframes tumble{
    0%{transform:rotateX(0deg) rotateY(0deg) scale(.6)}
    65%{transform:rotateX(540deg) rotateY(660deg) scale(1.15)}
    100%{transform:rotateX(720deg) rotateY(720deg) scale(1)}
  }
  .face3d{position:absolute;width:120px;height:120px;border-radius:18px;
    background:linear-gradient(135deg,#1b2350,#0c1130);border:2px solid var(--neon);
    display:flex;align-items:center;justify-content:center;font-family:'Black Han Sans';font-size:60px;color:var(--neon);
    box-shadow:inset 0 0 30px rgba(94,242,255,.3),0 0 30px rgba(94,242,255,.4);}
  .dresult{font-family:'Black Han Sans';font-size:28px;opacity:0;transition:.4s;text-align:center;}
  .dresult.show{opacity:1;}
  .dgood{color:var(--good);text-shadow:0 0 24px var(--good);}
  .dbad{color:var(--danger);text-shadow:0 0 24px var(--danger);}
  .dcheck{font-family:'Jua';color:#cdd8ff;font-size:16px;letter-spacing:1px;text-align:center;padding:0 16px;}

  #flash{position:fixed;inset:0;z-index:40;background:#fff;opacity:0;pointer-events:none;}
  .shake{animation:shake .5s;}
  @keyframes shake{0%,100%{transform:translate(0)}20%{transform:translate(-8px,4px)}40%{transform:translate(8px,-4px)}60%{transform:translate(-6px,-3px)}80%{transform:translate(6px,3px)}}
  #vignette{position:fixed;inset:0;z-index:1;pointer-events:none;box-shadow:inset 0 0 200px rgba(0,0,0,.7);transition:box-shadow 1s;}
  .danger-mode #vignette{box-shadow:inset 0 0 220px rgba(255,0,60,.45);}

  .toast{position:absolute;left:50%;top:14px;transform:translateX(-50%);z-index:35;font-family:'Jua';
    padding:8px 18px;border-radius:30px;font-size:14px;background:rgba(0,0,0,.7);border:1px solid var(--neon);
    color:var(--neon);opacity:0;transition:.35s;white-space:nowrap;}
  .toast.show{opacity:1;}

  .fade-in{animation:fadeUp .55s ease both;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

  #snd{position:absolute;top:10px;right:12px;z-index:36;cursor:pointer;font-size:18px;background:rgba(0,0,0,.4);
    border:1px solid rgba(255,255,255,.15);border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;color:var(--neon);}

  .hr{height:1px;background:linear-gradient(90deg,transparent,rgba(94,242,255,.4),transparent);margin:18px 0;}
  .center .btn{min-width:200px;}
  @media(max-width:560px){#scene{padding:18px 18px 8px;} .line{font-size:16px;} #choices{padding:6px 18px 18px;} .bar{width:56px;}}
</style>
</head>
<body>
<canvas id="stars"></canvas>
<div id="vignette"></div>
<div id="flash"></div>

<div id="app">
  <div class="stage" id="stage">
    <div id="snd" title="소리 켜기/끄기">🔇</div>
    <div class="toast" id="toast"></div>

    <div id="hud">
      <span class="hudchar" id="hudName">●</span>
      <div class="stat hp"><b>❤</b><div class="bar"><span id="bHp"></span></div></div>
      <div class="stat"><b style="color:#ff9a5b">용기</b><div class="bar"><span id="bCou" style="background:linear-gradient(90deg,#ff9a5b,#ffd166)"></span></div></div>
      <div class="stat"><b style="color:#8be9ff">지혜</b><div class="bar"><span id="bWis" style="background:linear-gradient(90deg,#5ef2ff,#8be9ff)"></span></div></div>
      <div class="stat"><b style="color:#ff9ad4">우정</b><div class="bar"><span id="bFri" style="background:linear-gradient(90deg,#ff6bd6,#ff9ad4)"></span></div></div>
      <div class="stat shadow"><b style="color:#b48bff">침식</b><div class="bar"><span id="bShd"></span></div></div>
      <div id="hudInv"></div>
    </div>

    <div id="scene"></div>
    <div id="choices"></div>

    <div id="diceLayer">
      <div class="dcheck" id="dCheck"></div>
      <div class="dwrap"><div class="die" id="die"><div class="face3d" id="dieFace">?</div></div></div>
      <div class="dresult" id="dRes"></div>
    </div>
  </div>
</div>

<script>
/* =========================================================
   방과 후, 균열 — 인터랙티브 TRPG (확장판)
   안내자: 승호 선생님 / 주인공: 범진·세나
   ========================================================= */

/* ---------- 사운드 ---------- */
let AC=null, sndOn=false;
function audio(){ if(!AC){ try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){} } return AC; }
function beep(freq=440,dur=.12,type='sine',vol=.08){
  if(!sndOn) return; const ac=audio(); if(!ac) return;
  const o=ac.createOscillator(), g=ac.createGain();
  o.type=type;o.frequency.value=freq;o.connect(g);g.connect(ac.destination);
  g.gain.setValueAtTime(vol,ac.currentTime);
  g.gain.exponentialRampToValueAtTime(.0001,ac.currentTime+dur);
  o.start();o.stop(ac.currentTime+dur);
}
function chord(arr,dur=.4){arr.forEach((f,i)=>setTimeout(()=>beep(f,dur,'triangle',.06),i*60));}
document.getElementById('snd').onclick=function(){
  sndOn=!sndOn;this.textContent=sndOn?'🔊':'🔇';if(sndOn){audio();beep(660,.1);}
};

/* ---------- 배경 ---------- */
const cv=document.getElementById('stars'), cx=cv.getContext('2d');
let W,H,stars=[],particles=[];
function resize(){W=cv.width=innerWidth;H=cv.height=innerHeight;}
addEventListener('resize',resize);resize();
for(let i=0;i<140;i++)stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.6+.3,s:Math.random()*.4+.05,t:Math.random()*6});
let hue=200;
function spawnBurst(x,y,color,n=26){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,sp=Math.random()*4+1;
  particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,color});}}
function loop(){
  cx.clearRect(0,0,W,H);
  for(const s of stars){s.t+=s.s*.05;const tw=.5+Math.sin(s.t)*.5;
    cx.beginPath();cx.fillStyle=`hsla(${hue},90%,70%,${.3+tw*.6})`;
    cx.arc(s.x,s.y,s.r*(0.7+tw*.6),0,7);cx.fill();
    s.y+=s.s;if(s.y>H){s.y=0;s.x=Math.random()*W;}}
  for(let i=particles.length-1;i>=0;i--){const p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=.04;p.life-=.02;
    if(p.life<=0){particles.splice(i,1);continue;}
    cx.globalAlpha=p.life;cx.fillStyle=p.color;cx.beginPath();cx.arc(p.x,p.y,2.4,0,7);cx.fill();cx.globalAlpha=1;}
  requestAnimationFrame(loop);
}
loop();
function setMood(h){hue=h;}

/* ---------- 상태 ---------- */
const S={name:null,face:'🧑',hp:100,cou:50,wis:50,fri:50,shadow:0,inv:[],flags:{},allyTrust:0,gameOver:false};
function other(){return S.name==='범진'?'세나':'범진';}
function otherColor(){return S.name==='범진'?'#ff9ad4':'#ffd166';}

const sceneEl=document.getElementById('scene'),choicesEl=document.getElementById('choices'),hud=document.getElementById('hud');

function clampStats(){['hp','cou','wis','fri','shadow'].forEach(k=>{S[k]=Math.max(0,Math.min(100,S[k]));});}
function refreshHUD(){
  clampStats();
  document.getElementById('hudName').textContent=S.face+' '+(S.name||'?');
  document.getElementById('bHp').style.width=S.hp+'%';
  document.getElementById('bCou').style.width=S.cou+'%';
  document.getElementById('bWis').style.width=S.wis+'%';
  document.getElementById('bFri').style.width=S.fri+'%';
  document.getElementById('bShd').style.width=S.shadow+'%';
  const inv=document.getElementById('hudInv');inv.innerHTML='';
  S.inv.forEach(it=>{const c=document.createElement('span');c.className='chip';c.textContent='✦ '+it;inv.appendChild(c);});
}

/* ---------- 효과 ---------- */
function flash(c='#fff',t=.55){const f=document.getElementById('flash');
  f.style.background=c;f.style.transition='none';f.style.opacity=t;
  requestAnimationFrame(()=>{f.style.transition='opacity .5s';f.style.opacity=0;});}
function shake(){const st=document.getElementById('stage');st.classList.remove('shake');void st.offsetWidth;st.classList.add('shake');}
function toast(msg,color){const t=document.getElementById('toast');t.textContent=msg;
  if(color)t.style.borderColor=t.style.color=color;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1700);}
function dangerMode(on){document.body.classList.toggle('danger-mode',on);}

function adjust(stat,amt){
  if(amt===0)return;
  const names={hp:'❤ 체력',cou:'용기',wis:'지혜',fri:'우정',shadow:'침식',allyTrust:'유대'};
  S[stat]+=amt;clampStats();refreshHUD();
  const sign=amt>0?'+':'';
  let col=amt>0?'#5cffa6':'#ff4d6d';
  if(stat==='shadow')col=amt>0?'#b48bff':'#9affd0';
  toast(`${names[stat]} ${sign}${amt}`,col);
  beep(amt>0?720:200,.12,'square',.05);
}

/* ---------- 출력 ---------- */
let typing=false, skip=false;
function addBlock(html){const d=document.createElement('div');d.className='fade-in';d.innerHTML=html;sceneEl.appendChild(d);sceneEl.scrollTop=sceneEl.scrollHeight;return d;}
function typeLine(speaker,text,cls=''){
  return new Promise(res=>{
    if(speaker){const s=document.createElement('div');s.className='speaker sp-'+speaker;s.textContent=speaker;sceneEl.appendChild(s);}
    const p=document.createElement('div');p.className='line '+cls;sceneEl.appendChild(p);
    sceneEl.scrollTop=sceneEl.scrollHeight;
    let i=0;typing=true;skip=false;
    const tick=()=>{
      if(skip){p.innerHTML=text;typing=false;sceneEl.scrollTop=sceneEl.scrollHeight;return res();}
      p.innerHTML=text.slice(0,i)+'<span style="opacity:.4">▍</span>';i++;
      if(i<=text.length){if(text[i-1]!==' '&&i%2===0)beep(380+Math.random()*60,.02,'sine',.012);setTimeout(tick,16);}
      else{p.innerHTML=text;typing=false;sceneEl.scrollTop=sceneEl.scrollHeight;res();}
    };tick();
  });
}
addEventListener('click',()=>{if(typing)skip=true;});
addEventListener('keydown',e=>{if(e.code==='Space'){if(typing)skip=true;}});
const wait=ms=>new Promise(r=>setTimeout(r,ms));

/* ---------- 선택지 ---------- */
function showChoices(list){
  choicesEl.innerHTML='';
  list.forEach(c=>{
    const b=document.createElement('div');b.className='choice fade-in';
    if(c.locked)b.classList.add('locked');
    b.innerHTML=c.text+(c.tag?`<span class="tag ${c.tagClass||''}">${c.tag}</span>`:'');
    b.onclick=()=>{if(c.locked){toast(c.lockMsg||'지금은 할 수 없다','#ff4d6d');return;}
      beep(520,.08,'triangle',.05);choicesEl.innerHTML='';c.go();};
    choicesEl.appendChild(b);
  });
  sceneEl.scrollTop=sceneEl.scrollHeight;
}
function clearChoices(){choicesEl.innerHTML='';}

/* "계속" 버튼: 긴 장면을 끊어서 호흡 주기 */
function next(fn,label='▶ 계속'){showChoices([{text:label,tagClass:'luck',go:fn}]);}

/* ---------- 주사위 판정 (재설계) ----------
   d20 + 보정(stat/15, 최대 6) vs 난이도 DC.
   20=대성공 무조건 / 1=대실패 무조건. 보정이 작아 실패가 자주 난다.
*/
function rollCheck(statKey,dc,label){
  return new Promise(res=>{
    const layer=document.getElementById('diceLayer'),die=document.getElementById('die'),face=document.getElementById('dieFace');
    const resEl=document.getElementById('dRes'),checkEl=document.getElementById('dCheck');
    const statName={cou:'용기',wis:'지혜',fri:'우정'}[statKey]||'';
    const bonus=Math.min(6,Math.floor((S[statKey]||0)/15));
    checkEl.innerHTML=`🎲 ${label}<br><span style="color:#8be9ff">${statName} 판정</span> · 보정 +${bonus} · 목표 ${dc} 이상`;
    resEl.className='dresult';resEl.textContent='';
    layer.style.display='flex';face.textContent='?';face.style.color='var(--neon)';
    die.classList.remove('roll');void die.offsetWidth;die.classList.add('roll');
    beep(300,.1,'sawtooth',.05);
    const spin=setInterval(()=>{face.textContent=1+Math.floor(Math.random()*20);beep(500+Math.random()*200,.02,'square',.02);},70);
    setTimeout(()=>{
      clearInterval(spin);
      const raw=1+Math.floor(Math.random()*20),total=raw+bonus;
      const crit=raw===20,fumble=raw===1;
      const success=crit?true:fumble?false:total>=dc;
      face.textContent=raw;face.style.color=success?'var(--good)':'var(--danger)';
      resEl.classList.add('show');
      let txt='';
      if(crit){txt='🌟 대성공! ('+raw+' + '+bonus+')';resEl.className='dresult show dgood';chord([523,659,784,1046]);flash('rgba(92,255,166,.4)');spawnBurst(W/2,H/2,'#5cffa6');}
      else if(fumble){txt='💀 대실패… ('+raw+')';resEl.className='dresult show dbad';chord([300,220,160]);shake();flash('rgba(255,77,109,.4)');}
      else{txt=(success?'✔ 성공':'✘ 실패')+`  (${raw} + ${bonus} = ${total} / ${dc})`;
        resEl.className='dresult show '+(success?'dgood':'dbad');success?chord([523,659,784]):chord([330,260]);if(!success)shake();}
      resEl.textContent=txt;

    },1150);

}

  await typeLine(null,'거인의 거대한 주먹이 내리꽂혔다! 가까스로 굴러 피했지만 충격이 온몸을 울린다.','narr');
  shake();flash('rgba(255,77,109,.4)');
  if(await damage(12,4))return;
  if(round>=1){
    await typeLine(other(),`${S.name}, 더는 안 돼! 내가 도울게—— 같이 가자!`);S.allyTrust+=1;adjust('fri',2);
    await typeLine(null,'둘은 마지막 힘을 모아 동시에 거인의 핵을 노렸다.','narr');
    const r2=await rollCheck('fri',12,'거인 — 마지막 합공');
    if(r2.success){flash('rgba(255,154,91,.4)');chord([392,523,659,784]);spawnBurst(W/2,H/2,'#ff9a5b');
      await typeLine(null,'둘의 힘이 합쳐지자 거인이 마침내 무너졌다!','narr');}
    else{await typeLine(null,'간신히, 정말 간신히 거인의 핵에 금을 냈다. 거인은 비틀거리다 스러졌다.','narr');if(await damage(6,4))return;}
    adjust('cou',2);give('용기의 룬');S.flags.roomGym=true;dangerMode(false);
    next(backToHub);return;
  }
  await typeLine(other(),'다시! 이번엔 침착하게!');
  next(()=>gymFight(mode,round+1));
}

  addBlock('<div class="big">막간 · 강당 앞에서</div>');
  await typeLine(null,'세 개의 룬이 강당 문 앞에서 천천히 회전한다. 문 너머로 검붉은 빛이 새어나온다. 들어가기 직전, 잠시 숨을 고른다.','narr');
  if(S.flags.suaAlly){
    await typeLine('수아','여기까지가… 내가 올 수 있는 끝이야. 그 너머는 너무 무서워. 미안해. 그치만, 너희는 분명 나랑 다를 거야.');
    await typeLine('수아',`${S.name}야. 혹시… 나가게 되면, 가끔 날 기억해줄래? 그거면 충분해.`);
  }
  await typeLine(other(), S.allyTrust>=4
    ? `${S.name}. 우리 진짜 여기까지 왔다. …솔직히 무섭긴 한데, 너랑 같이라서 하나도 안 두려워. 끝까지 같이야.`
    : `${S.name}. …우리 할 수 있겠지? 솔직히 좀 무서워. 그래도 도망치진 않을게.`);
  if(S.allyTrust>=4)adjust('fri',3);
  showChoices([
    {text:`"여기까지 온 우리가 자랑스러워. 가자."`,tag:'우정',tagClass:'fri',go:async()=>{adjust('fri',2);adjust('hp',5);await typeLine(S.name,'우리 둘이라면 뭐든 할 수 있어. 들어가자.');next(chapter3);}},
    {text:`잠시 마음을 가다듬고 각오를 다진다.`,tag:'용기',tagClass:'cou',go:async()=>{adjust('cou',2);adjust('hp',5);await typeLine(S.name,'…후. 좋아. 끝을 보자.');next(chapter3);}},
  ]);
}

/* =========================================================
   제 3 장 · 균열의 핵
   ========================================================= */
async function chapter3(){
  sceneEl.innerHTML='';clearChoices();setMood(280);dangerMode(true);flash('rgba(180,107,255,.5)');shake();
  addBlock('<div class="big glitch">제 3 장 · 균열의 핵</div>');
  await typeLine(null,'강당 문이 세 룬에 반응해 굉음과 함께 열린다. 천장까지 솟은 거대한 균열의 핵이, 검붉은 심장처럼 박동하고 있다. 그 표면엔 수많은 얼굴들이 떠올랐다 사라진다.','narr');
  beep(70,.8,'sawtooth',.09);
  next(chapter3b);
}
async function chapter3b(){
  await typeLine('승호','이거였구나… 모든 것의 중심. 얘들아, 마지막으로 잘 들어. 핵은 너희 감정을 거울처럼 비춘다. <b>분노로 부수려 하면 더 강해져.</b> 침착해야 해.');
  await typeLine('???',`『……드디어 왔구나. 나는 이 학교가 삼킨 모든 외로움, 모든 두려움. 너희도 결국… 나처럼 될 거야. 여기 영원히.』`,'glitch');
  await typeLine(other(),`${S.name}, 무섭지만… 끝까지 같이야. 알지?`);adjust('fri',1);
  await typeLine(null,'핵이 검은 촉수를 뻗어 너희를 덮친다! 세 번의 시험이 시작된다.','narr');
  next(bossPhase1);
}
async function bossPhase1(){
  await typeLine(null,'【시험 1 · 두려움】 핵이 너의 가장 무서운 환상을 끌어올린다. 텅 빈 교실에 혼자 남겨진, 아무도 너를 찾지 않는 미래.','narr');
  showChoices([
    {text:'눈을 똑바로 뜨고 환상을 마주한다.',tag:'용기',tagClass:'cou',go:()=>bossResolve('cou',15,bossPhase2)},
    {text:`${other()}의 손을 잡고 함께 버틴다.`,tag:'우정',tagClass:'fri',go:()=>bossResolve('fri',13,bossPhase2)},
  ]);
}
async function bossResolve(stat,dc,nextFn){
  const r=await rollCheck(stat,dc,'두려움의 시험');
  if(r.success){flash('rgba(94,242,255,.4)');chord([523,659,784,1046]);spawnBurst(W/2,H/2,'#5ef2ff');
    await typeLine(null,'환상이 산산이 부서졌다. 핵이 한 발짝 물러난다.','narr');adjust('cou',2);}
  else{shake();flash('rgba(255,77,109,.45)');
    await typeLine(null,'환상이 너를 집어삼킬 듯 휘몰아쳤다! 무릎이 꺾인다.','narr');
    if(await damage(14,8))return;
    if(S.allyTrust>=2){await typeLine(other(),`정신 차려, ${S.name}! 난 네 옆에 있어. 혼자가 아니야!`);adjust('hp',6);adjust('shadow',-3);}
  }
  next(nextFn);
}
async function bossPhase2(){
  await typeLine(null,'【시험 2 · 진실】 핵이 너의 죄책감을 파고든다.','narr');
  await typeLine('???',`『이 모든 건 너희 잘못이야. 균열을 연 건 너희의 외로움이지. …아니라고, 말할 수 있어?』`);
  showChoices([
    {text:'"외로웠던 건 맞아. 하지만 그건 잘못이 아니야."',tag:'지혜',tagClass:'wis',go:()=>bossResolve2('wise')},
    {text:'"닥쳐! 다 네 탓이잖아!"',tag:'용기',tagClass:'cou',go:()=>bossResolve2('rage')},
    {text:'"…그래. 우리도 외로웠어. 너처럼."',tag:'우정',tagClass:'fri',go:()=>bossResolve2('empathy')},
  ]);
}
async function bossResolve2(mode){
  let stat='wis',dc=13,pre=0;
  if(mode==='rage'){
    await typeLine(null,'분노가 폭발하자 핵이 그 힘을 게걸스럽게 먹고 더 거대해졌다!','narr');
    shake();flash('rgba(255,0,60,.5)');if(await damage(12,10))return;stat='cou';dc=16;
  }else if(mode==='empathy'){
    adjust('fri',3);stat='fri';dc=12;await typeLine(S.name,'네 마음, 모르지 않아. 외로움이 얼마나 추운지 우리도 아니까.');
  }else{adjust('wis',2);await typeLine(S.name,'외로움은 죄가 아니야. 우린 그냥… 누군가 손잡아주길 바랐을 뿐이야.');}
  const r=await rollCheck(stat,dc,'진실의 시험');
  if(r.success){flash('rgba(180,107,255,.4)');chord([587,740,880]);spawnBurst(W/2,H/2,'#b46bff');
    await typeLine(null,'핵의 박동이 흔들린다. 그 표면에, 처음으로 작은 균열이 갔다.','narr');adjust('shadow',-4);}
  else{shake();await typeLine(null,'핵이 거세게 반격했지만, 너희는 끝내 무릎 꿇지 않았다.','narr');if(await damage(10,6))return;}
  next(bossPhase3);
}
async function bossPhase3(){
  await typeLine(null,'【시험 3 · 기억】 핵의 표면이 잔잔해지며, 한 장면이 떠오른다.','narr');
  await typeLine(null,'아무도 없는 교실, 책상에 엎드려 우는 한 아이. ……수아다. 오래전, 이 학교에 처음 균열을 연 외로운 아이.','narr');
  if(S.flags.suaAlly){
    await typeLine(S.name,'수아…? 그럼 네가… 이 모든 것의 시작이었구나. 줄곧 혼자였던 거야.');
    await typeLine('수아','(핵 속에서) …미안해. 너무 외로워서, 나도 모르게 모두를 끌어들였어. 근데 너희는… 날 무서워하지 않았어. 처음으로.');
    adjust('fri',2);
  }else{
    await typeLine(S.name,'저 아이가… 줄곧 혼자 이 어둠을 끌어안고 있었던 거구나.');
  }
  next(bossFinal);
}
async function bossFinal(){
  await typeLine('승호','지금이야. 핵이 약해졌어. 마지막은… 부수는 게 아니란다. <b>받아들이고, 보내주는 거야.</b>');
  await typeLine(null,'핵의 중심에서, 외롭게 웅크린 작은 빛 하나가 보인다. 길 잃은 아이처럼, 떨고 있다.','narr');
  showChoices([
    {text:'균열의 불씨를 핵에 건넨다 — "이제 그만 쉬어도 돼."',tag:'불씨',tagClass:'luck',
      locked:!has('균열의 불씨'),lockMsg:'불씨가 없다… 다른 길을 찾아야 한다',go:()=>resolveEnding('true')},
    {text:'세 룬의 빛으로 핵을 가만히 감싸 안는다.',tag:'우정',tagClass:'fri',go:()=>resolveEnding('warm')},
    {text:'온 힘을 다해 핵을 내리친다.',tag:'용기',tagClass:'cou',go:()=>resolveEnding('force')},
  ]);
}

/* =========================================================
   엔딩
   ========================================================= */
function resolveEnding(type){
  const strong=(S.hp>=40&&S.allyTrust>=3&&S.shadow<=50);
  if(type==='true')ending('true');
  else if(type==='warm'||(type==='force'&&strong))ending('warm');
  else ending('force');
}
async function ending(type){
  sceneEl.innerHTML='';clearChoices();dangerMode(false);setMood(160);
  let title,body,color,grade;
  if(type==='true'){
    flash('rgba(255,209,102,.6)');chord([523,659,784,1046,1318]);
    for(let i=0;i<6;i++)setTimeout(()=>spawnBurst(Math.random()*W,Math.random()*H,'#ffd166',20),i*150);
    title='🌟 진정한 결말 · "함께 돌아오다"';color='#ffd166';grade='S';
    body=[
      `불씨가 핵의 가슴으로 스며들자, 검붉은 심장이 천천히 따뜻한 금빛으로 물들었다.`,
      `${S.flags.suaAlly?'『…고마워. 아무도 날 봐주지 않았는데. 너희가 처음이야. 이제… 더는 무섭지 않아.』':'『…고마워. 처음이야. 누군가 날 두려워하지 않은 건.』'}`,
      `핵은 미소 짓듯 빛으로 흩어지고, 뒤집힌 학교가 원래대로 돌아오기 시작했다. 두 개의 달이 하나가 되고, 사물함이 제자리로 내려앉는다.`,
      `정신을 차리니 다시 그 교실. 창밖엔 노을, 옆엔 ${other()}, 그리고 문을 열고 들어오는 승호 선생님.`,
    ];
  }else if(type==='warm'){
    flash('rgba(255,107,214,.5)');chord([523,659,784,880]);spawnBurst(W/2,H/2,'#ff6bd6',40);
    title='💗 따뜻한 결말 · "외로움을 안아주다"';color='#ff9ad4';grade='A';
    body=[
      `세 룬의 빛이 핵을 부드럽게 감쌌다. 핵은 잠시 저항하다가, 결국 너희 품 안에서 조용히 잠들 듯 사그라들었다.`,
      `${other()}: "우리가… 해냈어, ${S.name}."`,
      `학교가 빛 속에서 복원되고, 너희는 손을 꼭 잡은 채 현실로 돌아왔다.`,
      `완벽하진 않았을지 몰라도, 가장 중요한 건 끝까지 잃지 않았다. 서로를.`,
    ];
  }else{
    flash('rgba(94,242,255,.4)');chord([392,523,659]);
    title='⚔ 절반의 결말 · "부쉈지만…"';color='#8be9ff';grade='B';
    body=[
      `너희는 온 힘을 다해 핵을 내리쳤다. 핵은 비명과 함께 부서졌지만, 마지막 순간 슬픈 눈빛 하나를 남겼다.`,
      `학교는 돌아왔다. 하지만 가끔, 텅 빈 복도 끝에서 작은 흐느낌이 들리는 것 같다.`,
      `${other()}: "…우리, 정말 다 끝낸 거 맞지?"`,
      `무사히 돌아왔다. 다만, 누군가를 구할 수 있었을지도 모른다는 생각이 마음 한켠에 오래 남았다.`,
    ];
  }
  addBlock(`<div class="big" style="background:linear-gradient(90deg,${color},#fff,${color});-webkit-background-clip:text;background-clip:text;">${title}</div>`);
  for(const b of body){await typeLine(null,b,'narr');await wait(120);}
  addBlock('<div class="hr"></div>');
  await typeLine('승호','얘들아, 청소 다 했…… 어? 너희 왜 그렇게 봐? 무슨 일 있었니?');
  await typeLine(S.name, S.name==='범진'?'…아니에요, 선생님. 그냥, 좋은 친구가 있어서 다행이다 싶어서요.':'아무것도 아니에요. 그냥, 오늘 하루… 평생 잊지 못할 것 같아서요.');
  showResult(grade,color);
}

async function gameOver(){
  sceneEl.innerHTML='';clearChoices();dangerMode(true);setMood(0);flash('rgba(255,0,40,.5)');shake();
  addBlock('<div class="big" style="background:linear-gradient(90deg,#ff4d6d,#7a0a1f);-webkit-background-clip:text;background-clip:text;">💀 침몰 · "그림자가 되다"</div>');
  await typeLine(null,'시야가 검게 물든다. 더는 손가락 하나 움직일 힘이 없다.','narr');
  await typeLine(other(),`안 돼… ${S.name}! 눈 떠! 제발…!`);
  await typeLine(null,`${other()}의 목소리가 점점 멀어진다. 너의 몸이 보랏빛 안개로 흩어지며, 뒤집힌 학교의 일부가 되어간다.`,'narr');
  await typeLine(null,'…언젠가, 또 다른 누군가가 이 학교에 갇힌다면. 그때 너는, 그늘 속에서 그들에게 길을 알려주는 또 하나의 그림자가 되어 있을 것이다.','narr');
  await typeLine('승호','(아득히 멀리서) …미안하다, 얘들아. 다음엔… 꼭…');
  showResult('F','#ff4d6d',true);
}

function showResult(grade,color,over){
  const solved=[S.flags.roomLib,S.flags.roomGym,S.flags.roomMusic].filter(Boolean).length;
  addBlock(`<div style="text-align:center;margin-top:10px">
      <div style="font-family:'Black Han Sans';font-size:40px;color:${color};filter:drop-shadow(0 0 20px ${color})">평가 ${grade}</div>
      <div class="line" style="font-size:15px;color:#aebbe0">
        주인공 <b>${S.face} ${S.name}</b> · 동료 <b>${other()}</b><br>
        체력 ${S.hp} · 용기 ${S.cou} · 지혜 ${S.wis} · 우정 ${S.fri} · 침식 ${S.shadow}<br>
        유대 ${S.allyTrust} · 봉인 ${solved}/3 · 아이템 ${S.inv.length}개<br>
        <span class="chip" style="margin-top:8px;display:inline-block">${S.inv.join(' · ')||'없음'}</span>
      </div></div>`);
  if(!over)addBlock('<div class="big">— THE END —</div>'); else setMood(0);
  showChoices([
    {text:'🔄 다시 플레이 (다른 선택, 다른 결말)',tag:'재시작',tagClass:'luck',go:()=>{resetGame();start();}},
    {text:`🎭 ${other()}의 시점으로 다시 해보기`,go:()=>{resetGame();start();}},
  ]);
}

function resetGame(){
  S.name=null;S.face='🧑';S.hp=100;S.cou=50;S.wis=50;S.fri=50;S.shadow=0;S.inv=[];S.flags={};S.allyTrust=0;S.gameOver=false;
  dangerMode(false);hud.style.display='none';sceneEl.classList.remove('center');refreshHUD();
}

/* 시작 */
start();
</script>
</body>
</html>
